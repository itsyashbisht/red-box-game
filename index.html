<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Red Box Game</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="wrapper">
    <h1 class="title">Red Box Game</h1>
    <p class="subtitle">Click any box — only 3 can stay red.</p>
    <div class="grid" id="grid"></div>
    <div class="counter">
        Red boxes: <span id="count">0</span> / 3
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
